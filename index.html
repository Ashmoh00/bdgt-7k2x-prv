<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1B1F2A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ميزانيتي">
<title>ميزانيتي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #F4EEE2; --surface: #FFFFFF; --surface-2: #FAF5EA;
  --ink: #1B1F2A; --ink-soft: #4D5562; --ink-mute: #8A8F9C;
  --line: #E5DDCB; --line-strong: #D5CAB2;
  --accent: #2D5F50; --accent-soft: #DCE7E0;
  --warn: #B07523; --warn-soft: #F5E5C8;
  --danger: #B23E2C; --danger-soft: #F4D8D0;
  --ok: #2E7A5C;
  --ai: #5B3A8C; --ai-soft: #E8DDF2;
  --gh: #24292F; --gh-soft: #E1E4E8;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; background: var(--bg); font-family: 'Tajawal', -apple-system, BlinkMacSystemFont, sans-serif; color: var(--ink); min-height: 100vh; }
.num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; direction: ltr; display: inline-block; }
.display { font-weight: 800; letter-spacing: -0.01em; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea, select { font-family: inherit; }
input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
input[type="number"] { -moz-appearance: textfield; }

.app { max-width: 480px; margin: 0 auto; padding-bottom: 96px; }
.row { display: flex; align-items: center; gap: 12px; }
.flex-1 { flex: 1; min-width: 0; }
.gap-2 { gap: 8px; }
.mx-5 { margin-left: 20px; margin-right: 20px; }
.mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; }
.mb-2 { margin-bottom: 8px; }
.text-center { text-align: center; }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.hide-scroll::-webkit-scrollbar { display: none; }
.hide-scroll { scrollbar-width: none; }
.space-y-2 > * + * { margin-top: 8px; }
.space-y-3 > * + * { margin-top: 12px; }
.space-y-4 > * + * { margin-top: 16px; }
.space-y-5 > * + * { margin-top: 20px; }

.app-header { padding: 20px 20px 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.app-header .title-block { display: flex; flex-direction: column; min-width: 0; }
.app-header .label { font-size: 11px; color: var(--ink-mute); }
.app-header h1 { font-size: 20px; font-weight: 800; margin: 2px 0 0; letter-spacing: -0.01em; }

.icon-btn { width: 36px; height: 36px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: var(--ink-soft); font-size: 16px; transition: background 0.15s; flex-shrink: 0; }
.icon-btn:hover { background: rgba(0,0,0,0.05); }

.sync-pill { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
.sync-pill.idle { background: var(--surface-2); color: var(--ink-mute); }
.sync-pill.syncing { background: var(--ai-soft); color: var(--ai); }
.sync-pill.synced { background: var(--accent-soft); color: var(--accent); }
.sync-pill.error { background: var(--danger-soft); color: var(--danger); }

.card { background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 20px; }
.card-tight { padding: 14px; }
.card-dark { background: var(--ink); color: white; }
.card-accent { background: var(--accent); color: white; }
.card-ai { background: var(--ai); color: white; }
.card-warn { background: var(--warn-soft); }
.card-danger { background: var(--danger-soft); }
.card-ok { background: var(--accent-soft); }
.card-gh { border:1.5px solid var(--gh); background: linear-gradient(180deg, var(--gh-soft) 0%, var(--surface) 60%); }

.hero-amount { font-size: 48px; font-weight: 800; margin-top: 12px; letter-spacing: -0.02em; }
.hero-sub { font-size: 13px; opacity: 0.7; margin-top: 4px; }
.hero-label { font-size: 11px; opacity: 0.7; }

.bar-track { height: 6px; border-radius: 999px; overflow: hidden; background: var(--line); }
.bar-track.dark { background: rgba(255,255,255,0.15); }
.bar-fill { height: 100%; border-radius: 999px; transition: width 0.3s; }

.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.stat-box { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 10px; }
.stat-label { font-size: 10px; color: var(--ink-mute); }
.stat-value { font-size: 15px; font-weight: 800; margin-top: 2px; }
.stat-ok { color: var(--ok); } .stat-warn { color: var(--warn); } .stat-danger { color: var(--danger); }

.status-card { border-radius: 16px; padding: 16px; display: flex; gap: 12px; align-items: flex-start; }
.status-icon { font-size: 20px; }
.status-title { font-weight: 800; font-size: 14px; }
.status-msg { font-size: 12px; margin-top: 4px; color: var(--ink-soft); line-height: 1.5; }

.btn { padding: 10px 16px; border-radius: 10px; font-weight: 700; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: opacity 0.15s, transform 0.1s; }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: white; }
.btn-ai { background: var(--ai); color: white; }
.btn-gh { background: var(--gh); color: white; }
.btn-dark { background: var(--ink); color: white; }
.btn-soft { background: var(--surface-2); color: var(--ink); border: 1px solid var(--line); }
.btn-block { width: 100%; padding: 12px; }

.input { width: 100%; padding: 10px 12px; border-radius: 10px; background: var(--surface-2); border: 1px solid var(--line); font-size: 14px; color: var(--ink); outline: none; }
.input:focus { border-color: var(--accent); }
.label-small { font-size: 11px; color: var(--ink-mute); display: block; }
.input-big { font-size: 32px; font-weight: 800; background: transparent; border: none; border-bottom: 2px solid var(--line-strong); padding: 6px 0; width: 100%; direction: ltr; text-align: left; outline: none; }
.input-big:focus { border-bottom-color: var(--accent); }
textarea.input { resize: vertical; min-height: 140px; }

.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto; padding: 8px 12px 12px; background: linear-gradient(to top, var(--bg) 70%, transparent); z-index: 30; }
.bottom-nav-inner { background: var(--ink); border-radius: 16px; display: flex; justify-content: space-around; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
.tab-btn { flex: 1; padding: 10px 4px; display: flex; flex-direction: column; align-items: center; gap: 2px; color: white; opacity: 0.55; transition: opacity 0.15s; }
.tab-btn.active { opacity: 1; }
.tab-btn .ic { font-size: 18px; }
.tab-btn .lbl { font-size: 10px; font-weight: 700; }

.cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.cat-btn { padding: 8px 4px; border-radius: 8px; background: var(--surface-2); border: 1.5px solid transparent; text-align: center; }
.cat-btn.active { background: var(--accent-soft); border-color: var(--accent); }
.cat-btn .em { font-size: 18px; }
.cat-btn .nm { font-size: 9px; margin-top: 2px; color: var(--ink-soft); line-height: 1.2; }

.chip-row { display: flex; gap: 8px; padding: 0 20px 8px; overflow-x: auto; }
.chip { padding: 6px 12px; border-radius: 999px; background: var(--surface); border: 1px solid var(--line); color: var(--ink-soft); font-size: 11px; white-space: nowrap; display: inline-flex; align-items: center; gap: 4px; }
.chip.active { background: var(--ink); color: white; border: none; }

.list-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-top: 1px solid var(--line); width: 100%; text-align: right; }
.list-item:first-child { border-top: none; }
.list-item-em { font-size: 22px; }
.list-item-title { font-size: 13px; font-weight: 700; }
.list-item-sub { font-size: 11px; color: var(--ink-mute); margin-top: 2px; }
.list-item-amount { font-size: 13px; font-weight: 700; }

.pin-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
.pin-input { font-size: 28px; font-weight: 800; background: transparent; border: none; border-bottom: 2px solid var(--accent); text-align: center; letter-spacing: 0.3em; width: 160px; padding: 8px 0; outline: none; direction: ltr; }
.pin-input.error { border-bottom-color: var(--danger); animation: shake 0.4s; }
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

.chart-wrap { height: 180px; position: relative; }
.chart-wrap-small { height: 160px; }
.chart-wrap-tall { height: 200px; }

.empty-state { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 40px 20px; text-align: center; }
.empty-state .em { font-size: 32px; margin-bottom: 8px; }
.empty-state .msg { font-size: 14px; color: var(--ink-mute); }
.empty-state .sub { font-size: 11px; color: var(--ink-mute); margin-top: 4px; }

.notice { background: var(--warn-soft); border-radius: 10px; padding: 12px; font-size: 11px; color: var(--ink-soft); line-height: 1.5; }
.notice strong { color: var(--ink); }
.hint { background: var(--surface-2); border-radius: 10px; padding: 10px; font-size: 12px; color: var(--ink-soft); line-height: 1.5; }
.bar-pair { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
.bar-pair-label { display: flex; justify-content: space-between; font-size: 11px; opacity: 0.9; margin-bottom: 6px; }
.file-hidden { position: absolute; opacity: 0; pointer-events: none; }

.toggle-row { display: flex; justify-content: space-between; align-items: center; }
.switch { position: relative; width: 44px; height: 24px; border-radius: 999px; background: var(--line-strong); transition: background 0.2s; flex-shrink: 0; cursor: pointer; }
.switch.on { background: var(--gh); }
.switch::after { content: ''; position: absolute; top: 2px; right: 2px; width: 20px; height: 20px; border-radius: 50%; background: white; transition: transform 0.2s; }
.switch.on::after { transform: translateX(-20px); }

.ai-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; padding: 2px 6px; border-radius: 999px; background: var(--ai-soft); color: var(--ai); font-weight: 700; }

.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.guide-step { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 14px; }
.guide-step-num { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 50%; background: var(--gh); color: white; font-weight: 800; font-size: 13px; flex-shrink: 0; }

.gh-conflict { background: var(--warn-soft); border-radius: 12px; padding: 16px; }
</style>
</head>
<body>
<div id="root"></div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════════
// الثوابت
// ═══════════════════════════════════════════════════════════════════════
const DEFAULT_CONFIG = {
  monthlyBudget: 18000,
  savingsGoal: 2000,
  currency: 'ريال',
  resetDay: 1,
  aiEnabled: false,
  aiApiKey: '',
  ghOwner: '',
  ghRepo: '',
  ghToken: '',
  ghPath: 'data.json',
};

const CATEGORIES = [
  { id: 'groceries', name: 'سوبرماركت', emoji: '🛒', color: '#2D5F50' },
  { id: 'restaurants', name: 'مطاعم', emoji: '🍽️', color: '#B07523' },
  { id: 'delivery', name: 'توصيل طعام', emoji: '🛵', color: '#D4943B' },
  { id: 'fuel', name: 'بنزين', emoji: '⛽', color: '#5C6B8A' },
  { id: 'ride', name: 'مواصلات', emoji: '🚗', color: '#3A5A7A' },
  { id: 'pharmacy', name: 'صيدلية', emoji: '💊', color: '#4A8B6F' },
  { id: 'utilities', name: 'فواتير', emoji: '⚡', color: '#7A5C8A' },
  { id: 'shopping', name: 'تسوق', emoji: '🛍️', color: '#B85FA0' },
  { id: 'beauty', name: 'تجميل', emoji: '💄', color: '#C16B9D' },
  { id: 'cash', name: 'سحب نقدي', emoji: '💵', color: '#6B6B6B' },
  { id: 'transfers', name: 'تحويلات', emoji: '💸', color: '#8A6B4A' },
  { id: 'other', name: 'أخرى', emoji: '📌', color: '#9B9B9B' },
];

const MERCHANT_RULES = {
  groceries: ['CARREFOUR','DANUBE','LULU','HYPERPANDA','PANDA','BINDAWOOD','BIN DAWOOD','TAMIMI','OTHAIM','SPAR','NESTO','MARKET','SUPERMARKET','كارفور','دانوب','لولو','هايبر','بندة','العثيم','التميمي','بن داود'],
  restaurants: ['MCDONALDS','STARBUCKS','KFC','ALBAIK','AL BAIK','SHAWARMER','KUDU','DOMINOS','PIZZA HUT','HERFY','PAUL','COSTA','TIM HORTONS','DUNKIN','BURGER','RESTAURANT','CAFE','COFFEE','ماكدونالدز','ستاربكس','البيك','كودو','هرفي','دومينوز','بيتزا'],
  delivery: ['JAHEZ','HUNGERSTATION','HUNGER STATION','TALABAT','NOON FOOD','KEETA','TOYOU','NINJA','MRSOOL','CAREEM FOOD','جاهز','هنقرستيشن','طلبات','مرسول','نون فود'],
  fuel: ['ALDREES','SADAFCO','SASCO','MUKAMALAH','WAFI','PETROL','FUEL','PETROMIN','الدريس','ساسكو','وقود'],
  ride: ['UBER','CAREEM','BOLT','JEENY','أوبر','كريم'],
  pharmacy: ['NAHDI','AL DAWAA','AL-DAWAA','PHARMACY','UNITED PHARM','صيدلية','النهدي','الدواء'],
  utilities: ['STC','MOBILY','ZAIN','SEC','NWC','SAUDI ELECTRICITY','INTERNET','SADAD','اتصالات','موبايلي','زين','الكهرباء','المياه','سداد'],
  shopping: ['NAMSHI','AMAZON','NOON','SHEIN','SEPHORA','IKEA','CENTREPOINT','ZARA','H&M','MAX','CITY MAX','HOME CENTRE','SACO','EXTRA','JARIR','نمشي','أمازون','نون','شي إن','ايكيا','زارا','جرير','اكسترا'],
  beauty: ['BODY SHOP','BATH BODY','LOCCITANE','SALON','SPA','صالون','سبا'],
  cash: ['ATM','CASH WITHDRAWAL','سحب نقدي','نقدي','صراف'],
  transfers: ['TRANSFER','حوالة','تحويل'],
};

const MONTHS_AR = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const MONTHS_AR_SHORT = ['ينا','فبر','مار','أبر','ماي','يون','يول','أغس','سبت','أكت','نوف','ديس'];
const DOWS_AR = ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

// ═══════════════════════════════════════════════════════════════════════
// أدوات
// ═══════════════════════════════════════════════════════════════════════
function esc(s) { if (s == null) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
const newId = () => Math.random().toString(36).slice(2, 10);
const todayISO = () => new Date().toISOString().slice(0, 10);
const fmt = (n, cur = 'ريال') => Math.round(n).toLocaleString('en-US') + ' ' + cur;
const fmtNoCur = (n) => Math.round(n).toLocaleString('en-US');

function cycleKey(resetDay, now) {
  now = now || new Date(); resetDay = resetDay || 1;
  const d = now.getDate();
  if (d >= resetDay) return now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
  const prev = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  return prev.getFullYear() + '-' + String(prev.getMonth() + 1).padStart(2, '0');
}
function monthLabel(key) { const p = key.split('-').map(Number); return MONTHS_AR[p[1] - 1] + ' ' + p[0]; }
function txnsInCycle(txns, ckey, resetDay) {
  const p = ckey.split('-').map(Number);
  const start = new Date(p[0], p[1] - 1, resetDay);
  const end = new Date(p[0], p[1], resetDay - 1, 23, 59, 59);
  return txns.filter(t => { const d = new Date(t.date + 'T12:00:00'); return d >= start && d <= end; });
}
function getCat(id) { for (let i = 0; i < CATEGORIES.length; i++) if (CATEGORIES[i].id === id) return CATEGORIES[i]; return CATEGORIES[CATEGORIES.length - 1]; }
function hashPin(pin) { let h = 5381; for (let i = 0; i < pin.length; i++) h = ((h << 5) + h + pin.charCodeAt(i)) | 0; return String(h); }

// UTF-8 safe base64
function strToB64(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}
function b64ToStr(b64) {
  const bin = atob(b64.replace(/\s/g, ''));
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

// ═══════════════════════════════════════════════════════════════════════
// محلل الرسائل البنكية
// ═══════════════════════════════════════════════════════════════════════
function arabicNumsToEn(s) { return s.replace(/[٠-٩]/g, d => '٠١٢٣٤٥٦٧٨٩'.indexOf(d).toString()); }

function parseSingleSMS(rawText) {
  if (!rawText || rawText.trim().length < 5) return null;
  const text = arabicNumsToEn(rawText.replace(/\u200f|\u200e/g, '')).trim();
  const isWithdrawal = /(?:withdraw|cash|سحب نقدي|ATM)/i.test(text);
  const isIncoming = /(?:credited|received|deposit|incoming|واردة|إيداع|تم إيداع|تم استلام|راتب|salary)/i.test(text) && !/خصم|debit|purchase|شراء/i.test(text);
  const hasPurchaseKw = /(?:purchase|شراء|POS|payment|دفع)/i.test(text);
  const hasAmount = /\d+(?:\.\d+)?\s*(?:SAR|ر\.?س|SR|ريال)/i.test(text);
  if (!hasPurchaseKw && !isWithdrawal && !isIncoming && !hasAmount) return null;

  let amount = 0;
  const aPatterns = [
    /(?:بمبلغ|بقيمة|amount|مبلغ)[\s:]*(\d+(?:[,،]\d{3})*(?:\.\d+)?)\s*(?:SAR|SR|ر\.?س|ريال)/i,
    /(\d+(?:[,،]\d{3})*(?:\.\d+)?)\s*(?:SAR|SR|ر\.?س|ريال)/i,
    /(?:SAR|SR|ر\.?س|ريال)[\s:]*(\d+(?:[,،]\d{3})*(?:\.\d+)?)/i,
  ];
  for (let i = 0; i < aPatterns.length; i++) { const m = text.match(aPatterns[i]); if (m) { amount = parseFloat(m[1].replace(/[,،]/g, '')); if (!isNaN(amount) && amount > 0) break; } }
  if (!amount || amount <= 0) return null;

  let merchant = '';
  const mPatterns = [
    /(?:من|from|at|في محل|لدى)[\s:]+([A-Za-z\u0600-\u06FF][A-Za-z0-9\u0600-\u06FF\s&'\.\-]+?)(?=\s*(?:\n|في\s|on\s|بتاريخ|card|بطاقة|الرصيد|balance|$))/i,
    /(?:merchant|store)[\s:]+([A-Za-z][A-Za-z0-9\s&'\.\-]+)/i,
  ];
  for (let i = 0; i < mPatterns.length; i++) { const m = text.match(mPatterns[i]); if (m && m[1]) { merchant = m[1].trim().replace(/\s+/g, ' ').slice(0, 60); break; } }
  if (!merchant && isWithdrawal) merchant = 'سحب نقدي';
  if (!merchant && isIncoming) merchant = 'إيداع';
  if (!merchant) merchant = 'غير معروف';

  let date = todayISO();
  const dPatterns = [/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/, /(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/];
  for (let i = 0; i < dPatterns.length; i++) {
    const m = text.match(dPatterns[i]);
    if (m) {
      let y, mo, d;
      if (m[1].length === 4) { y = +m[1]; mo = +m[2]; d = +m[3]; }
      else { d = +m[1]; mo = +m[2]; y = +m[3]; if (y < 100) y += 2000; }
      if (y > 2000 && y < 2100 && mo >= 1 && mo <= 12 && d >= 1 && d <= 31) { date = y + '-' + String(mo).padStart(2,'0') + '-' + String(d).padStart(2,'0'); break; }
    }
  }
  return { amount, merchant, date, category: categorizeByMerchant(merchant, isWithdrawal, isIncoming), type: isIncoming ? 'income' : (isWithdrawal ? 'withdrawal' : 'purchase'), raw: rawText.trim().slice(0, 500) };
}

function categorizeByMerchant(merchant, isWithdrawal, isIncoming) {
  if (isIncoming) return 'transfers';
  if (isWithdrawal) return 'cash';
  const upper = merchant.toUpperCase();
  if (state.merchantRules[upper]) return state.merchantRules[upper];
  const cats = Object.keys(MERCHANT_RULES);
  for (let i = 0; i < cats.length; i++) {
    const kws = MERCHANT_RULES[cats[i]];
    for (let j = 0; j < kws.length; j++) if (upper.indexOf(kws[j].toUpperCase()) !== -1) return cats[i];
  }
  return 'other';
}

function parseMultipleSMS(text) {
  const parts = text.split(/\n\s*\n+|\n-{3,}\n|(?=(?:شراء\/POS|POS Purchase|عملية شراء|تنبيه|Purchase|تم خصم|دفع|سحب نقدي))/gi).map(s => s.trim()).filter(s => s.length > 10);
  if (parts.length === 0) { const s = parseSingleSMS(text); return s ? [s] : []; }
  const r = [];
  for (let i = 0; i < parts.length; i++) { const x = parseSingleSMS(parts[i]); if (x) r.push(x); }
  return r;
}

// تصنيف الذكاء الاصطناعي
// ═══════════════════════════════════════════════════════════════════════
async function classifyWithAI(merchant) {
  if (!state.config.aiApiKey) throw new Error('لا يوجد مفتاح API');
  const validIds = CATEGORIES.map(c => c.id).join(', ');
  const prompt = `صنّف هذا التاجر السعودي إلى إحدى الفئات: groceries (سوبرماركت), restaurants (مطاعم), delivery (توصيل طعام), fuel (بنزين), ride (مواصلات), pharmacy (صيدلية), utilities (فواتير), shopping (تسوق), beauty (تجميل), cash (سحب نقدي), transfers (تحويلات), other (لا يدخل في أي فئة).\n\nالتاجر: ${merchant}\n\nأجب بكلمة واحدة فقط هي id الفئة من (${validIds}).`;
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': state.config.aiApiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({ model: 'claude-haiku-4-5', max_tokens: 30, messages: [{ role: 'user', content: prompt }] }),
  });
  if (!res.ok) throw new Error('فشل الاتصال: ' + res.status);
  const data = await res.json();
  const txt = (data.content[0].text || '').trim().toLowerCase();
  for (let i = 0; i < CATEGORIES.length; i++) if (txt.indexOf(CATEGORIES[i].id) !== -1) return CATEGORIES[i].id;
  return 'other';
}

async function classifyAllUnknown() {
  const unknowns = state.parsedSMS.map((t, i) => ({ t, i })).filter(x => x.t.category === 'other');
  if (unknowns.length === 0) return;
  state.aiClassifying = true; render();
  try {
    for (let k = 0; k < unknowns.length; k++) {
      const { t, i } = unknowns[k];
      try {
        const cat = await classifyWithAI(t.merchant);
        state.merchantRules[t.merchant.toUpperCase()] = cat;
        const u = state.parsedSMS.slice(); u[i] = Object.assign({}, u[i], { category: cat });
        state.parsedSMS = u;
      } catch (err) {}
    }
    saveMerchantRules();
  } finally { state.aiClassifying = false; render(); }
}

// مزامنة GitHub
// ═══════════════════════════════════════════════════════════════════════
function ghIsConfigured() {
  const c = state.config;
  return !!(c.ghOwner && c.ghRepo && c.ghToken);
}

async function ghLoad() {
  const c = state.config;
  const url = `https://api.github.com/repos/${encodeURIComponent(c.ghOwner)}/${encodeURIComponent(c.ghRepo)}/contents/${encodeURIComponent(c.ghPath || 'data.json')}`;
  const res = await fetch(url, {
    headers: { 'Authorization': 'Bearer ' + c.ghToken, 'Accept': 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28' },
  });
  if (res.status === 404) return null;
  if (res.status === 401) throw new Error('UNAUTHORIZED');
  if (res.status === 403) throw new Error('FORBIDDEN');
  if (!res.ok) throw new Error('GH_LOAD_' + res.status);
  const result = await res.json();
  const content = b64ToStr(result.content);
  const data = JSON.parse(content);
  state.ghSha = result.sha;
  return data;
}

async function ghSave(data) {
  const c = state.config;
  const url = `https://api.github.com/repos/${encodeURIComponent(c.ghOwner)}/${encodeURIComponent(c.ghRepo)}/contents/${encodeURIComponent(c.ghPath || 'data.json')}`;
  const jsonStr = JSON.stringify(data, null, 2);
  const content = strToB64(jsonStr);
  const body = { message: 'Update ' + new Date().toISOString(), content };
  if (state.ghSha) body.sha = state.ghSha;
  const res = await fetch(url, {
    method: 'PUT',
    headers: { 'Authorization': 'Bearer ' + c.ghToken, 'Accept': 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28', 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (res.status === 409 || res.status === 422) {
    // SHA mismatch — pull then retry once
    state.ghSha = null;
    const remote = await ghLoad();
    if (remote) {
      // Use remote, then push
      applyRemoteData(remote);
      const merged = buildSyncPayload();
      return await ghSave(merged);
    }
  }
  if (res.status === 401) throw new Error('UNAUTHORIZED');
  if (!res.ok) throw new Error('GH_SAVE_' + res.status);
  const result = await res.json();
  state.ghSha = result.content.sha;
  return result;
}

function buildSyncPayload() {
  // أهم: لا نرسل ghToken للسحابة
  const safeCfg = Object.assign({}, state.config);
  delete safeCfg.ghToken;
  delete safeCfg.aiApiKey;
  return {
    version: 1,
    lastModified: new Date().toISOString(),
    config: safeCfg,
    txns: state.txns,
    merchantRules: state.merchantRules,
  };
}

function applyRemoteData(remote) {
  if (remote.txns) state.txns = remote.txns;
  if (remote.merchantRules) state.merchantRules = remote.merchantRules;
  if (remote.config) {
    // احتفظ بالمفاتيح المحلية (token, apiKey) ولا تكتب فوقهم
    const localKeys = { ghOwner: state.config.ghOwner, ghRepo: state.config.ghRepo, ghToken: state.config.ghToken, ghPath: state.config.ghPath, aiApiKey: state.config.aiApiKey };
    state.config = Object.assign({}, DEFAULT_CONFIG, remote.config, localKeys);
  }
  if (remote.lastModified) localStorage.setItem('last_modified', remote.lastModified);
  // Save locally
  try { localStorage.setItem('txns', JSON.stringify(state.txns)); } catch (e) {}
  try { localStorage.setItem('merchant_rules', JSON.stringify(state.merchantRules)); } catch (e) {}
  try { localStorage.setItem('cfg', JSON.stringify(state.config)); } catch (e) {}
}

let syncTimeout = null;
function queueSync() {
  if (!ghIsConfigured()) return;
  if (syncTimeout) clearTimeout(syncTimeout);
  syncTimeout = setTimeout(performSync, 1500);
}

async function performSync() {
  if (!ghIsConfigured()) return;
  state.syncStatus = 'syncing'; render();
  try {
    const payload = buildSyncPayload();
    await ghSave(payload);
    state.syncStatus = 'synced';
    state.lastSyncTime = new Date().toISOString();
    state.syncError = '';
  } catch (err) {
    state.syncStatus = 'error';
    state.syncError = err.message || String(err);
  }
  render();
}

async function initialSync() {
  if (!ghIsConfigured()) { state.syncStatus = 'idle'; return; }
  state.syncStatus = 'syncing'; render();
  try {
    const remote = await ghLoad();
    if (remote) {
      const localLM = localStorage.getItem('last_modified') || '';
      const remoteLM = remote.lastModified || '';
      const localEmpty = state.txns.length === 0 && Object.keys(state.merchantRules).length === 0;
      if (remoteLM > localLM || localEmpty) {
        // Remote newer (or local is empty) — use remote
        applyRemoteData(remote);
      } else if (localLM > remoteLM) {
        // Local newer — push it
        await ghSave(buildSyncPayload());
      }
    } else {
      // No remote yet — push local up
      if (state.txns.length > 0 || Object.keys(state.merchantRules).length > 0) {
        await ghSave(buildSyncPayload());
      }
    }
    state.syncStatus = 'synced';
    state.lastSyncTime = new Date().toISOString();
    state.syncError = '';
  } catch (err) {
    state.syncStatus = 'error';
    state.syncError = err.message || String(err);
  }
  render();
}

async function testGithubConnection() {
  const c = state.config;
  const url = `https://api.github.com/repos/${encodeURIComponent(c.ghOwner)}/${encodeURIComponent(c.ghRepo)}`;
  const res = await fetch(url, {
    headers: { 'Authorization': 'Bearer ' + c.ghToken, 'Accept': 'application/vnd.github+json' },
  });
  if (res.status === 401) throw new Error('المفتاح غير صحيح أو منتهي');
  if (res.status === 404) throw new Error('المستودع غير موجود أو المفتاح ما عنده صلاحية وصول');
  if (!res.ok) throw new Error('خطأ: ' + res.status);
  const repo = await res.json();
  return { name: repo.full_name, private: repo.private };
}

function analyticsView() {
  const cfg = state.config;
  const ckey = cycleKey(cfg.resetDay);
  const spendingTxns = txnsInCycle(state.txns, ckey, cfg.resetDay).filter(t => t.type !== 'income');
  if (spendingTxns.length === 0) {
    return `<header class="app-header"><div class="title-block"><div class="label">${esc(monthLabel(ckey))}</div><h1>تحليل البيانات</h1></div>${syncPill()}</header>
      <div class="mx-5"><div class="empty-state"><div class="em">📊</div><div class="msg">ما فيه عمليات لهذا الشهر بعد</div><div class="sub">ألصقي رسائل البنك من تبويب "إضافة"</div></div></div>`;
  }
  const byCat = {};
  for (let i = 0; i < spendingTxns.length; i++) { const t = spendingTxns[i]; byCat[t.category] = (byCat[t.category] || 0) + t.amount; }
  const catData = Object.entries(byCat).map(e => ({ id: e[0], name: getCat(e[0]).name, value: e[1], color: getCat(e[0]).color })).sort((a, b) => b.value - a.value);
  const byMerch = {};
  for (let i = 0; i < spendingTxns.length; i++) {
    const t = spendingTxns[i]; const k = t.merchant.toUpperCase();
    if (!byMerch[k]) byMerch[k] = { merchant: t.merchant, total: 0, count: 0, category: t.category };
    byMerch[k].total += t.amount; byMerch[k].count += 1;
  }
  const topMerchants = Object.values(byMerch).sort((a, b) => b.total - a.total).slice(0, 10);
  const totalSpent = spendingTxns.reduce((s, t) => s + t.amount, 0);
  const avgPerTxn = totalSpent / spendingTxns.length;
  const biggest = spendingTxns.slice().sort((a, b) => b.amount - a.amount)[0];
  state._analytics = { catData, spendingTxns, ckey };
  return `
    <header class="app-header"><div class="title-block"><div class="label">تحليل البيانات</div><h1>${esc(monthLabel(ckey))}</h1></div>${syncPill()}</header>
    <section class="mx-5"><div class="stats-grid">
      <div class="stat-box"><div class="stat-label">إجمالي الصرف</div><div class="stat-value num">${esc(fmt(totalSpent, cfg.currency))}</div></div>
      <div class="stat-box"><div class="stat-label">عدد العمليات</div><div class="stat-value num">${spendingTxns.length}</div></div>
      <div class="stat-box"><div class="stat-label">متوسط العملية</div><div class="stat-value num">${esc(fmt(avgPerTxn, cfg.currency))}</div></div>
    </div></section>
    <section class="mx-5 mt-4"><div class="card">
      <div style="font-weight:700; margin-bottom:12px;">وين راحت الفلوس</div>
      <div class="chart-wrap-tall"><canvas id="catChart"></canvas></div>
      <div class="space-y-2 mt-4">${catData.map(c => { const pct = (c.value / totalSpent) * 100; return `
        <div class="row"><div style="font-size:20px;">${getCat(c.id).emoji}</div>
          <div class="flex-1">
            <div style="display:flex; justify-content:space-between; align-items:baseline;"><div style="font-size:13px;">${esc(c.name)}</div><div class="num" style="font-size:13px; font-weight:700; color:${c.color};">${esc(fmt(c.value, cfg.currency))}</div></div>
            <div class="bar-track" style="margin-top:4px; height:4px;"><div class="bar-fill" style="width:${pct}%; background:${c.color};"></div></div>
          </div>
          <div class="num" style="font-size:10px; color:var(--ink-mute);">${Math.round(pct)}%</div>
        </div>`; }).join('')}</div>
    </div></section>
    <section class="mx-5 mt-4"><div class="card">
      <div style="font-weight:700; margin-bottom:12px;">أعلى ١٠ تجار</div>
      <div class="space-y-2">${topMerchants.map((m, i) => `<div class="row"><div class="display num" style="font-size:13px; width:20px; color:var(--ink-mute);">${i+1}</div><div style="font-size:20px;">${getCat(m.category).emoji}</div><div class="flex-1"><div style="font-size:13px;" class="truncate">${esc(m.merchant)}</div><div style="font-size:10px; color:var(--ink-mute);">${m.count} عملية</div></div><div class="num" style="font-size:13px; font-weight:700;">${esc(fmt(m.total, cfg.currency))}</div></div>`).join('')}</div>
    </div></section>
    <section class="mx-5 mt-4"><div class="card"><div style="font-weight:700; margin-bottom:12px;">الصرف اليومي</div><div class="chart-wrap"><canvas id="dailyChart"></canvas></div></div></section>
    <section class="mx-5 mt-4"><div class="card"><div style="font-weight:700;">أي يوم تصرفين أكثر</div><div style="font-size:11px; color:var(--ink-mute); margin-bottom:12px;">إجمالي حسب يوم الأسبوع</div><div class="chart-wrap-small"><canvas id="dowChart"></canvas></div></div></section>
    <section class="mx-5 mt-4"><div class="card"><div style="font-weight:700; margin-bottom:12px;">آخر ٦ أشهر</div><div class="chart-wrap-small"><canvas id="monthlyChart"></canvas></div></div></section>
    ${biggest ? `<section class="mx-5 mt-4"><div class="card card-warn"><div style="font-size:11px; color:var(--warn); margin-bottom:4px;">أكبر عملية</div><div class="row"><div style="font-size:28px;">${getCat(biggest.category).emoji}</div><div class="flex-1"><div style="font-weight:700; font-size:14px;">${esc(biggest.merchant)}</div><div style="font-size:11px; color:var(--ink-soft);">${esc(getCat(biggest.category).name)} · ${esc(biggest.date)}</div></div><div class="display num" style="font-size:18px; color:var(--warn);">${esc(fmt(biggest.amount, cfg.currency))}</div></div></div></section>` : ''}
  `;
}

                ابحثي عن <strong>Contents</strong> وغيّري Access إلى <strong>Read and write</strong><br>
                نزّلي تحت واضغطي <strong>Generate token</strong>
              </div>
            </div>
          </div>
        </div>

        <div class="guide-step">
          <div class="row" style="align-items:flex-start;">
            <div class="guide-step-num">4</div>
            <div class="flex-1">
              <div style="font-weight:700; font-size:14px;">انسخي المفتاح فوراً</div>
              <div style="font-size:12px; color:var(--ink-soft); line-height:1.7; margin-top:6px;">
                راح يظهر مفتاح يبدأ بـ <span style="font-family:monospace; background:var(--surface-2); padding:2px 6px; border-radius:4px;">github_pat_</span><br>
                <strong style="color:var(--danger);">⚠️ انسخيه الآن — راح يختفي بعد ما تغادرين الصفحة ولن تشوفينه مرة ثانية.</strong>
              </div>
            </div>
          </div>
        </div>

        <div class="guide-step">
          <div class="row" style="align-items:flex-start;">
            <div class="guide-step-num">5</div>
            <div class="flex-1">
              <div style="font-weight:700; font-size:14px;">ألصقي المعلومات في الإعدادات</div>
              <div style="font-size:12px; color:var(--ink-soft); line-height:1.7; margin-top:6px;">
                ارجعي للإعدادات هنا، ادخلي:<br>
                • اسم مستخدم GitHub (مثلاً: ashjan-nb)<br>
                • اسم المستودع: budget-data<br>
                • ألصقي المفتاح في حقل "مفتاح الوصول"<br>
                اضغطي "حفظ وبدء المزامنة" — بياناتك راح ترفع تلقائياً!
              </div>
            </div>
          </div>
        </div>

        <div class="card card-ok">
          <div style="font-weight:700; font-size:14px; color:var(--accent); margin-bottom:6px;">✓ بعد الإعداد</div>
          <div style="font-size:12px; color:var(--ink-soft); line-height:1.7;">
            في كل جهاز جديد، افتحي الموقع → الإعدادات → ألصقي نفس البيانات الثلاث. كل بياناتك راح تتحمّل تلقائياً وتتزامن مع كل تغيير.
          </div>
        </div>

        <button class="btn btn-gh" style="width:100%;" data-action="close-view">رجوع للإعدادات</button>
      </div>
    </div>
  `;
}

function guideView() {
  const steps = [
    { t: 'أضيفي للشاشة الرئيسية (آيفون)', d: 'في Safari، اضغطي زر المشاركة → "إضافة إلى الشاشة الرئيسية".' },
    { t: 'إضافة المصاريف بالنسخ واللصق', d: 'من تطبيق "الرسائل": ادخلي محادثة البنك → اضغطي رسالة طويلاً → "أكثر" → اختاري عدة رسائل → نسخ → ألصقي في تبويب "إضافة".' },
    { t: 'التعلّم التلقائي', d: 'لما الموقع يحط تاجر في "أخرى"، عدّلي تصنيفه يدوياً مرة وحدة. من بعدها يتذكره دائماً.' },
    { t: 'المزامنة السحابية', d: 'فعّلي GitHub Sync من الإعدادات. بعدها كل بياناتك تتزامن تلقائياً بين كل أجهزتك.' },
    { t: 'الذكاء الاصطناعي (اختياري)', d: 'لو تبين تصنيف فوري للتجار المجهولين، فعّلي AI من الإعدادات (يحتاج حساب Anthropic مدفوع).' },
  ];
  return `
    <div class="app">
      <header class="app-header"><div class="row gap-2"><button class="icon-btn" data-action="close-view">→</button><h1>دليل الاستخدام</h1></div></header>
      <div class="mx-5 space-y-3">
        ${steps.map((s, i) => `<div class="card"><div class="row" style="align-items:flex-start;"><div class="display num" style="font-size:22px; color:var(--accent);">${String(i + 1).padStart(2, '0')}</div><div class="flex-1"><div style="font-weight:700;">${esc(s.t)}</div><div style="font-size:13px; margin-top:6px; color:var(--ink-soft); line-height:1.6;">${esc(s.d)}</div></div></div></div>`).join('')}
      </div>
    </div>
  `;
}

function bottomNav() {
  const tabs = [{id:'dashboard',label:'الرئيسية',icon:'📊'},{id:'paste',label:'إضافة',icon:'➕'},{id:'analytics',label:'تحليل',icon:'📈'},{id:'transactions',label:'العمليات',icon:'📋'}];
  return `<nav class="bottom-nav"><div class="bottom-nav-inner">${tabs.map(t => `<button class="tab-btn ${state.tab === t.id ? 'active' : ''}" data-action="set-tab" data-tab="${t.id}"><div class="ic">${t.icon}</div><div class="lbl">${esc(t.label)}</div></button>`).join('')}</div></nav>`;
}

// ═══════════════════════════════════════════════════════════════════════
// الرسوم
// ═══════════════════════════════════════════════════════════════════════
function renderCharts() {
  if (typeof Chart === 'undefined' || !state._analytics) return;
  const cfg = state.config;
  const { catData, spendingTxns, ckey } = state._analytics;
  const fnt = { family: 'Tajawal', size: 11 };
  const tipS = { backgroundColor: '#1B1F2A', titleFont: fnt, bodyFont: fnt, padding: 8, cornerRadius: 6 };
  const cc = document.getElementById('catChart');
  if (cc) charts.push(new Chart(cc.getContext('2d'), { type: 'doughnut', data: { labels: catData.map(c => c.name), datasets: [{ data: catData.map(c => c.value), backgroundColor: catData.map(c => c.color), borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, cutout: '55%', plugins: { legend: { display: false }, tooltip: Object.assign({}, tipS, { callbacks: { label: ctx => ctx.label + ': ' + fmt(ctx.parsed, cfg.currency) } }) } } }));
  const dc = document.getElementById('dailyChart');
  if (dc) {
    const byDay = {};
    for (let i = 0; i < spendingTxns.length; i++) byDay[spendingTxns[i].date] = (byDay[spendingTxns[i].date] || 0) + spendingTxns[i].amount;
    const lbls = Object.keys(byDay).sort();
    charts.push(new Chart(dc.getContext('2d'), { type: 'bar', data: { labels: lbls.map(d => d.slice(8, 10)), datasets: [{ data: lbls.map(d => Math.round(byDay[d])), backgroundColor: '#2D5F50', borderRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: Object.assign({}, tipS, { callbacks: { label: ctx => fmt(ctx.parsed.y, cfg.currency) } }) }, scales: { y: { ticks: { font: fnt, color: '#8A8F9C' }, grid: { color: '#E5DDCB' } }, x: { ticks: { font: fnt, color: '#8A8F9C' }, grid: { display: false } } } } }));
  }
  const dw = document.getElementById('dowChart');
  if (dw) {
    const arr = [0,0,0,0,0,0,0];
    for (let i = 0; i < spendingTxns.length; i++) arr[new Date(spendingTxns[i].date + 'T12:00:00').getDay()] += spendingTxns[i].amount;
    charts.push(new Chart(dw.getContext('2d'), { type: 'bar', data: { labels: DOWS_AR, datasets: [{ data: arr.map(v => Math.round(v)), backgroundColor: '#B07523', borderRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: Object.assign({}, tipS, { callbacks: { label: ctx => fmt(ctx.parsed.y, cfg.currency) } }) }, scales: { y: { ticks: { font: fnt, color: '#8A8F9C' }, grid: { color: '#E5DDCB' } }, x: { ticks: { font: fnt, color: '#8A8F9C' }, grid: { display: false } } } } }));
  }
  const mc = document.getElementById('monthlyChart');
  if (mc) {
    const p = ckey.split('-').map(Number);
    const ms = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(p[0], p[1] - 1 - i, 1);
      const k = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
      const t = txnsInCycle(state.txns, k, cfg.resetDay).filter(x => x.type !== 'income');
      ms.push({ month: MONTHS_AR_SHORT[d.getMonth()], amount: Math.round(t.reduce((s, x) => s + x.amount, 0)) });
    }
    charts.push(new Chart(mc.getContext('2d'), { type: 'line', data: { labels: ms.map(m => m.month), datasets: [{ data: ms.map(m => m.amount), borderColor: '#2D5F50', backgroundColor: 'rgba(45,95,80,0.1)', borderWidth: 2.5, tension: 0.3, fill: true, pointBackgroundColor: '#2D5F50', pointRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: Object.assign({}, tipS, { callbacks: { label: ctx => fmt(ctx.parsed.y, cfg.currency) } }) }, scales: { y: { ticks: { font: fnt, color: '#8A8F9C' }, grid: { color: '#E5DDCB' } }, x: { ticks: { font: fnt, color: '#8A8F9C' }, grid: { display: false } } } } }));
  }
}

// ═══════════════════════════════════════════════════════════════════════
// الأحداث
// ═══════════════════════════════════════════════════════════════════════
function attachEvents() {
  const els = document.querySelectorAll('[data-action]');
  for (let i = 0; i < els.length; i++) {
    const el = els[i];
    const action = el.dataset.action;
    if (action === 'pin-input-keypress') el.addEventListener('keydown', e => { if (e.key === 'Enter') handleAction('pin-submit', e); });
    else el.addEventListener('click', e => handleAction(action, e));
  }
  const f = document.getElementById('importFile');
  if (f) f.addEventListener('change', handleImportFile);
}

function handleAction(action, e) {
  const el = e.currentTarget || (e.target && e.target.closest('[data-action]'));
  const data = el ? el.dataset : {};
  switch (action) {
    case 'open-settings': setState({ view: 'settings' }); break;
    case 'open-guide': setState({ view: 'guide' }); break;
    case 'open-github-guide': setState({ view: 'github-guide' }); break;
    case 'close-view': setState({ view: null }); break;
    case 'set-tab': setState({ tab: data.tab, parsedSMS: [], parseError: '', filterCat: 'all' }); break;
    case 'goto-paste': setState({ tab: 'paste' }); break;
    case 'set-filter': setState({ filterCat: data.cat }); break;

    case 'parse-sms': {
      const ta = document.getElementById('smsTextarea');
      const text = ta ? ta.value : '';
      if (!text.trim()) { setState({ parseError: 'ألصقي نص الرسائل أولاً' }); return; }
      const r = parseMultipleSMS(text);
      if (r.length === 0) { setState({ parseError: 'ما قدرت أستخرج معلومات.' }); return; }
      setState({ parsedSMS: r, parseError: '' });
      break;
    }
    case 'clear-parsed': setState({ parsedSMS: [] }); break;
    case 'classify-ai': classifyAllUnknown(); break;
    case 'save-parsed': {
      const t = state.parsedSMS.map(x => Object.assign({}, x, { id: newId() }));
      state.txns = t.concat(state.txns); saveTxns();
      setState({ parsedSMS: [], parseError: '', tab: 'dashboard' });
      break;
    }
    case 'toggle-parsed-edit': { const k = 'parsedEdit_' + data.idx; setState({ [k]: !state[k] }); break; }
    case 'remove-parsed': { setState({ parsedSMS: state.parsedSMS.filter((_, i) => i !== parseInt(data.idx, 10)) }); break; }
    case 'set-parsed-cat': {
      const idx = parseInt(data.idx, 10);
      const u = state.parsedSMS.slice();
      const oldCat = u[idx].category, newCat = data.cat;
      u[idx] = Object.assign({}, u[idx], { category: newCat });
      if (oldCat !== newCat && u[idx].merchant && u[idx].merchant !== 'غير معروف') {
        state.merchantRules[u[idx].merchant.toUpperCase()] = newCat;
        saveMerchantRules();
      }
      setState({ parsedSMS: u });
      break;
    }
    case 'edit-txn': {
      const t = state.txns.find(x => x.id === data.id);
      if (t) setState({ editingTxn: Object.assign({}, t), editingTxnOriginal: Object.assign({}, t) });
      break;
    }
    case 'set-edit-cat': { state.editingTxn = Object.assign({}, state.editingTxn, { category: data.cat }); render(); break; }
    case 'save-edit': {
      const m = document.getElementById('editMerchant').value;
      const a = parseFloat(document.getElementById('editAmount').value) || 0;
      const d = document.getElementById('editDate').value;
      const newCat = state.editingTxn.category;
      const origCat = state.editingTxnOriginal ? state.editingTxnOriginal.category : newCat;
      if (newCat !== origCat && m && m !== 'غير معروف') { state.merchantRules[m.toUpperCase()] = newCat; saveMerchantRules(); }
      const patch = { merchant: m, amount: a, date: d, category: newCat };
      state.txns = state.txns.map(t => t.id === state.editingTxn.id ? Object.assign({}, t, patch) : t);
      saveTxns();
      setState({ editingTxn: null, editingTxnOriginal: null });
      break;
    }
    case 'cancel-edit': setState({ editingTxn: null, editingTxnOriginal: null }); break;
    case 'delete-txn': { if (confirm('متأكدة من حذف العملية؟')) { state.txns = state.txns.filter(t => t.id !== state.editingTxn.id); saveTxns(); setState({ editingTxn: null, editingTxnOriginal: null }); } break; }

    case 'save-settings': {
      const b = parseFloat(document.getElementById('setBudget').value) || 0;
      const s = parseFloat(document.getElementById('setSavings').value) || 0;
      const r = Math.min(28, Math.max(1, parseInt(document.getElementById('setResetDay').value, 10) || 1));
      const apiKeyEl = document.getElementById('setApiKey');
      const aiApiKey = apiKeyEl ? apiKeyEl.value : state.config.aiApiKey;
      const ghOwnerEl = document.getElementById('setGhOwner');
      const ghRepoEl = document.getElementById('setGhRepo');
      const ghTokenEl = document.getElementById('setGhToken');
      const patch = { monthlyBudget: b, savingsGoal: s, resetDay: r, aiApiKey };
      if (ghOwnerEl) patch.ghOwner = ghOwnerEl.value.trim();
      if (ghRepoEl) patch.ghRepo = ghRepoEl.value.trim();
      if (ghTokenEl && ghTokenEl.value) patch.ghToken = ghTokenEl.value.trim();
      state.config = Object.assign({}, state.config, patch);
      saveConfig();
      setState({ view: null });
      break;
    }
    case 'save-github': {
      const o = document.getElementById('setGhOwner').value.trim();
      const r = document.getElementById('setGhRepo').value.trim();
      const t = document.getElementById('setGhToken').value.trim();
      if (!o || !r || !t) { alert('املأي كل الحقول الثلاثة'); return; }
      state.config = Object.assign({}, state.config, { ghOwner: o, ghRepo: r, ghToken: t });
      try { localStorage.setItem('cfg', JSON.stringify(state.config)); } catch (e) {}
      state.ghSha = null;
      (async () => {
        try {
          const repo = await testGithubConnection();
          alert('✓ نجح الاتصال!\nالمستودع: ' + repo.name + (repo.private ? ' (خاص)' : ' ⚠️ عام (غير آمن)'));
          await initialSync();
        } catch (err) {
          alert('❌ فشل الاتصال: ' + err.message);
        }
      })();
      break;
    }
    case 'test-github': {
      (async () => {
        const ghOwnerEl = document.getElementById('setGhOwner');
        const ghRepoEl = document.getElementById('setGhRepo');
        const ghTokenEl = document.getElementById('setGhToken');
        if (ghOwnerEl) state.config.ghOwner = ghOwnerEl.value.trim();
        if (ghRepoEl) state.config.ghRepo = ghRepoEl.value.trim();
        if (ghTokenEl && ghTokenEl.value) state.config.ghToken = ghTokenEl.value.trim();
        try {
          const repo = await testGithubConnection();
          alert('✓ نجح الاتصال!\nالمستودع: ' + repo.name + (repo.private ? ' (خاص ✓)' : ' ⚠️ عام'));
        } catch (err) { alert('❌ ' + err.message); }
      })();
      break;
    }
    case 'manual-sync': performSync(); break;
    case 'toggle-ai': { state.config = Object.assign({}, state.config, { aiEnabled: !state.config.aiEnabled }); saveConfig(); render(); break; }
    case 'test-ai': {
      (async () => {
        const ke = document.getElementById('setApiKey');
        if (ke) { state.config.aiApiKey = ke.value; try { localStorage.setItem('cfg', JSON.stringify(state.config)); } catch(e){} }
        try { const r = await classifyWithAI('CARREFOUR HYPERMARKET'); alert('✓ نجح! Claude صنّف "كارفور" كـ: ' + r); }
        catch (err) { alert('❌ فشل: ' + err.message); }
      })();
      break;
    }
    case 'clear-rules': { if (confirm('حذف ' + Object.keys(state.merchantRules).length + ' قاعدة متعلَّمة؟')) { state.merchantRules = {}; saveMerchantRules(); render(); } break; }
    case 'set-pin': {
      const pe = document.getElementById('newPin');
      const pin = pe ? pe.value : '';
      if (pin.length < 4) { alert('الرمز يحتاج ٤ أرقام على الأقل'); return; }
      const h = hashPin(pin);
      localStorage.setItem('pin_hash', h);
      state.pinHash = h;
      alert('✓ تم تفعيل الرمز');
      render();
      break;
    }
    case 'remove-pin': { if (confirm('إلغاء الرمز؟')) { localStorage.removeItem('pin_hash'); state.pinHash = null; render(); } break; }
    case 'pin-submit': {
      const inp = document.getElementById('pinInput');
      const pin = inp ? inp.value : '';
      if (hashPin(pin) === state.pinHash) setState({ unlocked: true, pinAttemptError: false });
      else { if (inp) inp.value = ''; setState({ pinAttemptError: true }); }
      break;
    }
    case 'export-data': {
      const d = { cfg: state.config, txns: state.txns, merchantRules: state.merchantRules, exported: new Date().toISOString() };
      const blob = new Blob([JSON.stringify(d, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'budget-' + todayISO() + '.json'; a.click();
      URL.revokeObjectURL(url);
      break;
    }
    case 'trigger-import': { const i = document.getElementById('importFile'); if (i) i.click(); break; }
  }
}

function handleImportFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (!confirm('استبدال البيانات الحالية؟')) return;
      if (d.cfg) { state.config = Object.assign({}, DEFAULT_CONFIG, d.cfg); saveConfig(); }
      if (d.txns) { state.txns = d.txns; saveTxns(); }
      if (d.merchantRules) { state.merchantRules = d.merchantRules; saveMerchantRules(); }
      alert('✓ تم الاستيراد');
      render();
    } catch (err) { alert('❌ ملف غير صالح'); }
  };
  r.readAsText(file);
}

loadState();
render();
// Initial sync on load (non-blocking)
if (ghIsConfigured()) {
  setTimeout(() => initialSync(), 100);
}
</script>
